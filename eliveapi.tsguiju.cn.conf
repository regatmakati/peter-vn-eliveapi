upstream pgzbclb2 {
	ip_hash;
	server 172.19.0.12:81;
	server 172.19.0.5:81;
}
server
{
    listen 80;
	listen 443 ssl http2;
    server_name eliveapi.tsguiju.cn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/eliveapi;
    
    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/eliveapi.tsguiju.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/eliveapi.tsguiju.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;



    #SSL-END
    
    location / {
    	proxy_pass http://pgzbclb2;
    	proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  	
   }

    access_log  /www/wwwlogs/eliveapi.tsguiju.cn.log;
    error_log  /www/wwwlogs/eliveapi.tsguiju.cn.error.log;
}